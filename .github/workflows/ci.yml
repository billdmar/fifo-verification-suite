name: CI

on: [push, pull_request]

jobs:
  verify:
    name: Lint / Synth / Formal BMC / Sim
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install OSS CAD Suite (linux-x64, pinned 2026-06-04) ──────────────
      - name: Install OSS CAD Suite
        run: |
          curl -L -o oss-cad-suite.tgz \
            https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-06-04/oss-cad-suite-linux-x64-20260604.tgz
          tar -xzf oss-cad-suite.tgz
          echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH

      # ── Install Verible (linux x86_64, pinned) ────────────────────────────
      - name: Install Verible
        run: |
          VERIBLE_VER=v0.0-4071-g8d9f2c97
          curl -L -o verible.tar.gz \
            "https://github.com/chipsalliance/verible/releases/download/$VERIBLE_VER/verible-$VERIBLE_VER-linux-static-x86_64.tar.gz"
          mkdir -p "$HOME/verible"
          tar xzf verible.tar.gz -C "$HOME/verible" --strip-components=1
          echo "$HOME/verible/bin" >> "$GITHUB_PATH"

      # ── CI gate steps ─────────────────────────────────────────────────────
      - name: Lint — sync FIFO (Verilator)
        run: make lint

      - name: Lint — async FIFO (Verilator)
        run: make lint-async

      - name: Lint — AXI4-Stream wrapper (Verilator)
        run: make lint-axis

      - name: Lint — FWFT (show-ahead) FIFO (Verilator)
        run: make lint-fwft

      - name: Lint — asymmetric-width FIFO, both directions (Verilator)
        run: make lint-width

      - name: Lint — AXI4-Stream width converter, both directions (Verilator)
        run: make lint-axisconv

      - name: Lint — store-and-forward packet FIFO (Verilator)
        run: make lint-pktfifo

      - name: Lint — SECDED ECC FIFO (Verilator)
        run: make lint-ecc

      - name: Lint — Verible style gate (all RTL)
        run: make lint-verible

      - name: Synthesise (Yosys)
        run: make synth

      - name: Formal — sync BMC depth 20 (gate)
        run: make formal-bmc

      - name: Formal — bounded liveness / progress depth 20 (gate)
        run: make formal-live

      - name: Formal — async CDC BMC depth 16, multiclock (gate)
        run: make formal-async-bmc

      - name: Formal — async cover reachability (gate)
        run: make formal-async-cover

      - name: Formal — AXI4-Stream protocol compliance BMC depth 20 (gate)
        run: make formal-axis-bmc

      - name: Formal — AXI4-Stream cover reachability (gate)
        run: make formal-axis-cover

      - name: Formal — sync cover witnesses fill/drain/wrap/round-trip (gate)
        run: make formal-cover

      - name: Formal — FWFT show-ahead/integrity BMC depth 20 (gate)
        run: make formal-fwft-bmc

      - name: Formal — FWFT cover reachability (gate)
        run: make formal-fwft-cover

      - name: Formal — FWFT pointer/count/flag k-induction PROVEN (gate)
        run: make formal-fwft-prove

      - name: Formal — asymmetric-width FIFO width-crossing BMC, down-sizer depth 14 (gate)
        run: make formal-width-bmc

      - name: Formal — asymmetric-width FIFO cover reachability, down-sizer (gate)
        run: make formal-width-cover

      - name: Formal — asymmetric-width FIFO BMC, UP-sizer depth 14 (gate)
        run: make formal-width-up-bmc

      - name: Formal — asymmetric-width FIFO cover reachability, UP-sizer (gate)
        run: make formal-width-up-cover

      - name: Formal — AXI4-Stream width-converter protocol BMC depth 14 (gate)
        run: make formal-axisconv-bmc

      - name: Formal — AXI4-Stream width-converter cover reachability (gate)
        run: make formal-axisconv-cover

      - name: Formal — store-and-forward packet FIFO BMC depth 14 (gate)
        run: make formal-pktfifo-bmc

      - name: Formal — store-and-forward packet FIFO cover reachability (gate)
        run: make formal-pktfifo-cover

      - name: Formal — SECDED ECC correct/detect over all error positions BMC depth 16 (gate)
        run: make formal-ecc-bmc

      - name: Formal — SECDED ECC cover reachability (corrected single / detected double) (gate)
        run: make formal-ecc-cover

      - name: Formal — SECDED ECC pointer/count/flag k-induction PROVEN (gate)
        run: make formal-ecc-prove

      - name: Simulate — Verilator TB depth 8 + functional coverage (gate)
        run: make sim

      - name: Simulate — depth sweep 4/8/16/64/256 (gate)
        run: make sim-sweep

      - name: Simulate — data-width sweep 1/8/64 (gate)
        run: make sim-width-sweep

      - name: Coverage — Verilator line/toggle/branch/expr (gate)
        run: make sim-coverage

      - name: Self-test — fault injection must be caught (gate)
        run: make sim-fault

      # cocotb is bundled in the OSS CAD Suite; install only if missing (defensive).
      - name: Ensure cocotb available
        run: python3 -c "import cocotb" 2>/dev/null || pip install -r tb/requirements.txt

      - name: Simulate — cocotb Python testbench (gate)
        run: make sim-cocotb

      - name: Self-test — cocotb fault injection must be caught (gate)
        run: make sim-cocotb-fault

      - name: Simulate — FWFT (show-ahead) FIFO TB (gate)
        run: make sim-fwft

      - name: Self-test — FWFT fault injection must be caught (gate)
        run: make sim-fwft-fault

      - name: Simulate — asymmetric-width FIFO sweep (2:1/4:1/8:1, both dirs+endian) (gate)
        run: make sim-width-fifo-sweep

      - name: Self-test — width-FIFO fault injection must be caught (gate)
        run: make sim-width-fifo-fault

      - name: Simulate — store-and-forward packet FIFO TB (gate)
        run: make sim-pktfifo

      - name: Self-test — packet-FIFO fault injection must be caught (gate)
        run: make sim-pktfifo-fault

      - name: Simulate — SECDED ECC FIFO clean-path TB (gate)
        run: make sim-ecc

      - name: Self-test — ECC fault injection must be caught (gate)
        run: make sim-ecc-fault

      # ── Informational — k-induction proofs (may be slow / not fully closed)
      - name: Formal — sync k-induction proof depth 15 (informational)
        run: make formal-prove
        continue-on-error: true

      - name: Formal — async k-induction (informational, step not closed)
        run: make formal-async-prove
        continue-on-error: true

      # ── Artefacts ─────────────────────────────────────────────────────────
      - name: Upload formal BMC results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-bmc-results
          path: formal/sync_fifo_bmc/
          if-no-files-found: warn

      - name: Upload simulation VCD
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-waveform
          path: docs/waveforms/sim_waves.vcd
          if-no-files-found: warn

      - name: Upload Verilator coverage report (line/toggle/branch/expr annotated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verilator-coverage-report
          path: logs_annotated/
          if-no-files-found: warn

  # ── Informational — real FPGA P&R sweep (ECP5 + iCE40). Non-gating: open-source
  #    place-and-route is slow and heuristic; committed numbers live in
  #    docs/fpga_results.md. This job re-runs the flow to keep them honest. ──────
  fpga:
    name: FPGA P&R sweep (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSS CAD Suite
        run: |
          curl -L -o oss-cad-suite.tgz \
            https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-06-04/oss-cad-suite-linux-x64-20260604.tgz
          tar -xzf oss-cad-suite.tgz
          echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH

      - name: FPGA report (Yosys + nextpnr, ECP5 + iCE40)
        run: make fpga-report

  # ── Informational — real BITSTREAM build for demo_top (RTL -> chip). Non-gating:
  #    proves the full synth -> P&R -> pack flow emits flashable .bit/.bin (no board
  #    is programmed). Functional correctness is the formal + Verilator job. ───────
  bitstream:
    name: Bitstream build demo_top (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSS CAD Suite
        run: |
          curl -L -o oss-cad-suite.tgz \
            https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-06-04/oss-cad-suite-linux-x64-20260604.tgz
          tar -xzf oss-cad-suite.tgz
          echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH

      - name: Build ECP5 .bit + iCE40 .bin (Yosys -> nextpnr -> ecppack/icepack)
        run: make bitstream

      - name: Upload bitstreams
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-top-bitstreams
          path: build/bitstream/demo_top_*.bi*
          if-no-files-found: warn

  # ── Informational — mutation testing (mcy): mutate sync_fifo and measure how
  #    many mutants the formal suite kills. Non-gating: mutation campaigns are
  #    slow/variable; the committed kill-rate lives in docs/mutation_testing.md.
  #    This job re-runs it to keep that number honest. ───────────────────────────
  mutation:
    name: Mutation testing sync_fifo (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OSS CAD Suite
        run: |
          curl -L -o oss-cad-suite.tgz \
            https://github.com/YosysHQ/oss-cad-suite-build/releases/download/2026-06-04/oss-cad-suite-linux-x64-20260604.tgz
          tar -xzf oss-cad-suite.tgz
          echo "$PWD/oss-cad-suite/bin" >> $GITHUB_PATH

      - name: Run mutation campaign (mcy → kill-rate)
        run: make mutate

      - name: Upload mcy database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcy-mutation-db
          path: mcy/sync/database/
          if-no-files-found: warn
